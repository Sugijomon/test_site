  <!-- ═══════════════════════════════════════════════
       GLOBALE STIJLEN — kopieer dit naar elke pagina

  <style>
    body { min-height: max(884px, 100dvh); }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* Achtergrond nebula glow — gebruik in hero secties */
    .nebula-glow {
      background:
        radial-gradient(circle at 20% 30%, rgba(196, 231, 255, 0.45) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(186, 230, 255, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 88, 152, 0.08) 0%, transparent 70%);
    }

    /* Glasmorphisme kaartje */
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Scroll-reveal animatie */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden">

  <!-- ═══════════════════════════════════════════════
       SCRIPTS — altijd onderaan, in deze volgorde
  ═══════════════════════════════════════════════ -->

  <!-- Nav + footer injecteren -->
  <script src="/components/shared.js"></script>

  <!-- Scroll-reveal voor .reveal elementen -->
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

       STAP 3: Voeg hier pagina-specifieke scripts toe
